version: '3.1'

services:
  pet_db:
    image: mysql:8.4.5
    restart: always
    volumes:
      - pet_db:/var/lib/mysql
    ports:
      - "3310:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    networks:
      - homelab

networks:
  homelab:
    name: homelab
    external: true

volumes:
  pet_db:

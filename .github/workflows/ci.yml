name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, PET-01]

jobs:
  maven-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build
        run: ./mvnw clean package -DskipTests

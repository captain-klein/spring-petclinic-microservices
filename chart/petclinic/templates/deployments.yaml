{{- range $name, $svc := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $.Release.Name }}-{{ $name }}
  labels:
    app.kubernetes.io/name: {{ $.Release.Name }}-{{ $name }}
    app.kubernetes.io/part-of: petclinic
spec:
  replicas: {{ $svc.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $.Release.Name }}-{{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $.Release.Name }}-{{ $name }}
        app.kubernetes.io/part-of: petclinic
    spec:
      containers:
        - name: {{ $name }}
          image: "{{ $.Values.global.imageRegistry }}/{{ $svc.image }}:{{ $.Values.global.imageTag }}"
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ $svc.port }}
          env:
          {{- if and $.Values.database.enabled $svc.mysql }}
          envFrom:
            - secretRef:
                name: {{ $.Values.database.secretName }}
          {{- else }}
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "docker"
          {{- end }}
          readinessProbe:
            httpGet:
              path: {{ dig "probes" "path" "/actuator/health" $svc }}
              port: http
            initialDelaySeconds: {{ dig "probes" "initialDelaySeconds" 45 $svc }}
            timeoutSeconds: {{ dig "probes" "timeoutSeconds" 5 $svc }}
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: {{ dig "probes" "path" "/actuator/health" $svc }}
              port: http
            initialDelaySeconds: {{ dig "probes" "initialDelaySeconds" 90 $svc }}
            timeoutSeconds: {{ dig "probes" "timeoutSeconds" 5 $svc }}
            periodSeconds: 20
            failureThreshold: 6
{{- end }}
